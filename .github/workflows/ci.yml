name: CI

on:
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx vue-tsc --noEmit
      - run: npm test

  backend-ts:
    name: TS Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-ts/package.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  backend-py:
    name: Python Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m py_compile app.py
      - run: python -m py_compile db.py
      - run: python -m pytest test_db.py -v
