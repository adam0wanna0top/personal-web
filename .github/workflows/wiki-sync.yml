name: Wiki Sync

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  wiki-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
      LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lark-cli
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/larksuite/cli/releases/latest \
            | grep "browser_download_url.*linux-amd64\.tar\.gz" \
            | cut -d '"' -f 4)
          curl -sL "$DOWNLOAD_URL" | tar xz
          chmod +x lark-cli
          sudo mv lark-cli /usr/local/bin/
          lark-cli --version

      - name: Configure lark-cli auth
        run: |
          printf '%s' "$LARK_APP_SECRET" | lark-cli config init \
            --app-id "$LARK_APP_ID" \
            --app-secret-stdin \
            --brand feishu

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Sync to Feishu Wiki
        run: |
          claude -p "你是知识库同步助手。分析本次提交的变更并更新飞书知识库。

          提交 SHA: ${{ github.sha }}
          仓库: ${{ github.repository }}

          步骤：
          1. 运行 \`git log --oneline -5\` 和 \`git diff --name-only HEAD~1..HEAD\` 了解最近变更
          2. 根据映射关系确定需要更新的文档：
             - README.md → doc SwjwdffWho9BXwxC790cRROjne8, O7LAd3rPDoqxxVxnlmhczSV3nod, RYQcdASkXo8fw7xgguucLc7gnNb
             - frontend/ → doc UC8Md3fNeoMSv1xtCYZcDPbNnbc
             - backend-ts/ → doc CJx9drLfUoaCVExq2JkcHAgVnBg
             - backend-py/ → doc GdZidl9HhoBLYxxRbZTcVwabnYb
             - GUIDE.md → doc Kqzxd61xVoSjJCxyskQcGyA5nQg
             - DEVELOPMENT.md → doc JY8Hd9To3ozjpLx9oUncvWfPnqb
          3. 用 \`lark-cli docs +fetch --doc <id> --format pretty\` 读取当前文档
          4. 阅读变更的源文件，理解变更内容
          5. 用 \`lark-cli docs +update --doc <id> --mode overwrite/append --markdown \"...\"\` 更新文档
          6. 在变更记录 (doc TLfsd3EGlowgT7x2JqbcMokCnve) 中追加本次变更摘要

          注意：只更新受影响的文档，保留原文档结构。" \
            --allowedTools "Read,Grep,Glob,Bash(lark-cli:*),Bash(git:*)" \
            --max-turns 20 \
            --output-format text
